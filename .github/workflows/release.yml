name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for changelog generation

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build & zip Chrome
        run: bun run zip

      - name: Build & zip Firefox
        run: bun run zip:firefox

      - name: List built artifacts
        run: ls -la .output/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "$PREV_TAG..HEAD")
          fi
          {
            echo "body<<EOF"
            echo "## What's changed"
            echo ""
            echo "$LOG"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/$PREV_TAG...$GITHUB_REF_NAME"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*.zip
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
