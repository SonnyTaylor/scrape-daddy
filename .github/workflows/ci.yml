name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run compile

      - name: Build (Chrome)
        run: bun run build

      - name: Build (Firefox)
        run: bun run build:firefox
