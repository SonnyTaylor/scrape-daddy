<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="bolt" x1="200" y1="80" x2="320" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Data lines (stylized extraction) -->
  <g opacity="0.15">
    <rect x="100" y="160" width="180" height="4" rx="2" fill="#f59e0b"/>
    <rect x="100" y="180" width="130" height="4" rx="2" fill="#f59e0b"/>
    <rect x="100" y="200" width="160" height="4" rx="2" fill="#f59e0b"/>
    <rect x="100" y="340" width="140" height="4" rx="2" fill="#f59e0b"/>
    <rect x="100" y="360" width="170" height="4" rx="2" fill="#f59e0b"/>
  </g>
  <!-- Lightning bolt -->
  <path d="M 290 80 L 190 260 L 260 260 L 220 432 L 340 230 L 268 230 L 320 80 Z" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Bolt highlight -->
  <path d="M 290 80 L 190 260 L 260 260 L 220 432 L 340 230 L 268 230 L 320 80 Z" fill="none" stroke="#fde68a" stroke-width="2" opacity="0.3"/>
</svg>
